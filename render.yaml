services:
  - type: web
    name: ipl-auction-multiplayer
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
      - key: MONGODB_URI
      - key: GEMINI_API_KEY
      - key: JWT_SECRET
      - key: EMAIL_USER
      - key: EMAIL_PASS
